server:
  port: ${SERVER_PORT:8002}

spring:
  application:
    name: interview-pilot-admin
  config:
    import: optional:classpath:interview-followup-rule.yaml
  profiles:
    include: satoken,sse
  servlet:
    multipart:
      location: ${INTERVIEW_PILOT_MULTIPART_TEMP_DIR:${interview-pilot.storage.upload-temp-dir}}
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:mainshi_agent}?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=${APP_TIMEZONE:Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:122333}
  data:
    mongodb:
      host: ${MONGODB_HOST:127.0.0.1}
      port: ${MONGODB_PORT:27017}
      database: ${MONGODB_DATABASE:interview_pilot}
      # username: ${MONGODB_USERNAME:}
      # password: ${MONGODB_PASSWORD:}
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
        shutdown-timeout: 100ms
      timeout: 10000ms
  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: redis-session-task-
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
        thread-name-prefix: redis-session-async-
  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:${MIMO_API_KEY:}}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_MODEL:mimo-v2.5}
          temperature: ${SPRING_AI_OPENAI_TEMPERATURE:0.7}
      embedding:
        options:
          model: ${SPRING_AI_OPENAI_EMBEDDING_MODEL:mimo-v2.5}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    defaults:
      enabled: true

logging:
  file:
    path: ${INTERVIEW_PILOT_LOG_DIR:${interview-pilot.storage.log-dir}}

collection:
  vector:
    similarity-threshold: 0.9

mimo:
  api-key: ${MIMO_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}
  openai-base-url: ${MIMO_OPENAI_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
  anthropic-base-url: ${MIMO_ANTHROPIC_BASE_URL:https://token-plan-cn.xiaomimimo.com/anthropic}
  chat-model: ${MIMO_CHAT_MODEL:mimo-v2.5}
  pro-model: ${MIMO_PRO_MODEL:mimo-v2.5-pro}
  asr-model: ${MIMO_ASR_MODEL:mimo-v2.5-asr}
  tts-model: ${MIMO_TTS_MODEL:mimo-v2.5-tts}
  tts-voice: ${MIMO_TTS_VOICE:Chloe}
  tts-format: ${MIMO_TTS_FORMAT:wav}
  asr-language: ${MIMO_ASR_LANGUAGE:auto}
  pcm-sample-rate: ${MIMO_PCM_SAMPLE_RATE:16000}
  pcm-channels: ${MIMO_PCM_CHANNELS:1}
  pcm-bits-per-sample: ${MIMO_PCM_BITS_PER_SAMPLE:16}

legacy:
  xunfei:
    enabled: ${LEGACY_XUNFEI_ENABLED:false}

xunfei:
  lat-key:
    app-id: ${XUNFEI_APP_ID:}
    api-key: ${XUNFEI_API_KEY:}
    api-secret: ${XUNFEI_API_SECRET:}
    rta-api-key: ${XUNFEI_RTA_API_KEY:}

interview-pilot:
  security:
    require-xunfei-secrets: false
    require-mimo-secrets: ${REQUIRE_MIMO_SECRETS:false}
  storage:
    base-dir: ${INTERVIEW_PILOT_STORAGE_BASE_DIR:${user.home}/.interview-pilot}
    upload-temp-dir: ${INTERVIEW_PILOT_MULTIPART_TEMP_DIR:${interview-pilot.storage.base-dir}/temp/upload}
    agent-file-dir: ${INTERVIEW_PILOT_AGENT_FILE_DIR:${interview-pilot.storage.base-dir}/agent-files}
    audio-temp-dir: ${INTERVIEW_PILOT_AUDIO_TEMP_DIR:${interview-pilot.storage.base-dir}/temp/audio}
    log-dir: ${INTERVIEW_PILOT_LOG_DIR:${interview-pilot.storage.base-dir}/logs}
    recording-dir: ${INTERVIEW_PILOT_RECORDING_DIR:${interview-pilot.storage.base-dir}/recordings}
  thread-pool:
    general:
      core-pool-size: 50
      max-pool-size: 200
      queue-capacity: 1000
      keep-alive-seconds: 300
      thread-name-prefix: ip-async-
    ai-io:
      core-pool-size: 24
      max-pool-size: 64
      queue-capacity: 400
      keep-alive-seconds: 120
      thread-name-prefix: ip-ai-io-
    cpu:
      core-pool-size: 8
      max-pool-size: 16
      queue-capacity: 256
      keep-alive-seconds: 60
      thread-name-prefix: ip-cpu-
    query:
      core-pool-size: 16
      max-pool-size: 48
      queue-capacity: 600
      keep-alive-seconds: 120
      thread-name-prefix: ip-query-
    scheduled-pool-size: 8
    scheduled-thread-name-prefix: ip-schedule-
  agent-binding:
    general-agent-chat: ${INTERVIEW_PILOT_AGENT_GENERAL_CHAT:通用智能体}
    interview-question-extraction: ${INTERVIEW_PILOT_AGENT_INTERVIEW_QUESTION_EXTRACTION:面试出题官}
    interview-answer-evaluation: ${INTERVIEW_PILOT_AGENT_INTERVIEW_ANSWER_EVALUATION:用户答案评分官}
    interview-demeanor: ${INTERVIEW_PILOT_AGENT_INTERVIEW_DEMEANOR:神态分析官}
    interview-question-asking: ${INTERVIEW_PILOT_AGENT_INTERVIEW_QUESTION_ASKING:面试提问官}
  flow-limit:
    enable: true
    time-window-seconds: 1
    max-access-count: 20
    requested-tokens: 1
    interview-answer-time-window-seconds: 1
    interview-answer-max-access-count: 8
    interview-heavy-time-window-seconds: 1
    interview-heavy-max-access-count: 2
    interview-read-time-window-seconds: 1
    interview-read-max-access-count: 15
    interview-ai-call-time-window-seconds: 1
    interview-ai-call-max-access-count: 6
  ai-guard:
    enable: true
    circuit-sliding-window-size: 50
    circuit-failure-rate-threshold: 50
    circuit-permitted-calls-in-half-open-state: 10
    circuit-open-state-wait-millis: 30000
    executor-threads: 32
    stages:
      interview-evaluation:
        timeout-millis: 20000
        max-concurrent-calls: 30
        retry-count: 1
        retry-wait-millis: 100
      interview-followup:
        timeout-millis: 20000
        max-concurrent-calls: 20
        retry-count: 1
        retry-wait-millis: 100
      interview-extraction:
        timeout-millis: 60000
        max-concurrent-calls: 8
        retry-count: 0
        retry-wait-millis: 0
      interview-demeanor:
        timeout-millis: 20000
        max-concurrent-calls: 6
        retry-count: 0
        retry-wait-millis: 0
      interview-report-review:
        timeout-millis: 300000
        max-concurrent-calls: 6
        retry-count: 0
        retry-wait-millis: 0
      interview-reference-answer:
        timeout-millis: 300000
        max-concurrent-calls: 6
        retry-count: 0
        retry-wait-millis: 0
  ai-singleflight:
    enable: true
    mode: hybrid
    distributed-enabled: true
    ttl-millis: 65000
    wait-timeout-millis: 65000
    stream-block-timeout-millis: 3000
    poll-fallback-interval-millis: 2000
    follower-max-wait-millis: 20000
    l1-cache-max-size: 1000
    cleanup-threshold: 256
    heavy-lock-expire-seconds: 90
    heavy-lock-wait-millis: 0
    stage-policies:
      interview-evaluation:
        heartbeat-interval-millis: 3000
        running-ttl-millis: 15000
        takeover-detect-millis: 10000
        result-ttl-millis: 600000
        failed-result-ttl-millis: 60000
        compression-threshold-bytes: 4096
        compression-codec: gzip
        l1-cache-enabled: true
        l1-cache-ttl-millis: 30000
      interview-followup:
        heartbeat-interval-millis: 2500
        running-ttl-millis: 12000
        takeover-detect-millis: 8000
        result-ttl-millis: 180000
        failed-result-ttl-millis: 30000
        compression-threshold-bytes: 2048
        compression-codec: gzip
        l1-cache-enabled: true
        l1-cache-ttl-millis: 15000
      interview-extraction:
        heartbeat-interval-millis: 4000
        running-ttl-millis: 20000
        takeover-detect-millis: 12000
        result-ttl-millis: 1800000
        failed-result-ttl-millis: 60000
        compression-threshold-bytes: 1024
        compression-codec: gzip
        l1-cache-enabled: true
        l1-cache-ttl-millis: 60000
      interview-demeanor:
        heartbeat-interval-millis: 5000
        running-ttl-millis: 30000
        takeover-detect-millis: 15000
        result-ttl-millis: 900000
        failed-result-ttl-millis: 60000
        compression-threshold-bytes: 2048
        compression-codec: gzip
        l1-cache-enabled: false
  interview:
    answer-guard:
      lock-expire-seconds: -1
      lock-watchdog-enabled: true
      processing-expire-seconds: 120
      processing-long-tail-expire-seconds: 300
      replay-expire-hours: 24
      lock-wait-millis: 0
    turn-repair:
      enable: true
      fixed-delay-millis: 3000
      batch-size: 50
      max-retries: 6
  redis-session:
    enable: true
    message-expire-seconds: 604800
    sync-delay-seconds: 30
    batch-sync-size: 100
    max-queue-size: 10000
    clean-interval-seconds: 300
